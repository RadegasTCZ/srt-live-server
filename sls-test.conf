srt {
    worker_threads     1;
    worker_connections 100;

    log_file  logs/error.log;
    log_level info;

    server {
        listen    8080;
        latency   120;

        domain_publisher radoo;
        domain_player    radoo;

        backlog              10;
        idle_streams_timeout 30;

        # Uncomment to require SRT encryption on this listener.
        # Every publisher and player must send the same passphrase
        # in their SRT URL for the connection to succeed.
        #srt_passphrase "change-me-please-at-least-10-chars";
        #srt_pbkeylen   16;   # 16/24/32 = AES-128/192/256; omit for libsrt default

        app {
            app_publisher push;
            app_player    pull;

            record_hls off;
        }
    }
}
