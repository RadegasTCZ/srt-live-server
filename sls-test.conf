srt {
    worker_threads     1;
    worker_connections 100;

    log_file  logs/error.log;
    log_level info;

    server {
        listen    8080;
        latency   120;

        domain_publisher radoo;
        domain_player    radoo;

        backlog              10;
        idle_streams_timeout 30;

        app {
            app_publisher push;
            app_player    pull;

            record_hls off;
        }
    }
}
