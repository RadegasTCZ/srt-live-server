srt {
    worker_threads     1;
    worker_connections 100;

    log_file  logs/error.log;
    log_level info;

    server {
        listen    8080;
        latency   120;

        domain_publisher radoo;
        domain_player    radoo;

        backlog              10;
        idle_streams_timeout 30;

        # Two encryption modes are mutually exclusive. Pick ONE or neither.
        #
        # Mode A -- listener-wide: every publisher and player must use the
        # same passphrase in their SRT URL. Simple but coarse.
        #srt_passphrase your-secret-min-10-chars;
        #srt_pbkeylen   16;   # 16/24/32 = AES-128/192/256; omit for libsrt default
        #
        # Mode B -- per-user: stream keys authorise individual streamers,
        # each with their own publish/play passphrase (or plaintext).
        # Grant = add a line to the file, revoke = remove it, then sls -r.
        # Copy sls-users.conf.example to sls-users.conf before first use.
        user_file sls-users.conf;

        app {
            app_publisher push;
            app_player    pull;

            record_hls off;
        }
    }
}
