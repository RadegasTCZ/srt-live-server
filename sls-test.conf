srt {
    worker_threads     1;
    worker_connections 100;

    log_file  logs/error.log;
    log_level info;

    server {
        listen    8080;
        latency   120;

        domain_publisher radoo;
        domain_player    radoo;

        backlog              10;
        idle_streams_timeout 30;

        # Listener-wide SRT encryption. Every publisher and player
        # must send the same passphrase in their SRT URL.
        # pbkeylen: 16/24/32 = AES-128/192/256; omit for libsrt default.
        srt_passphrase cNpy8Tl2gHQNy5ud;
        srt_pbkeylen   16;

        app {
            app_publisher push;
            app_player    pull;

            record_hls off;
        }
    }
}
