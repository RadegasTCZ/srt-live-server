# Per-stream credentials for SLS. Consumed via the `user_file` directive.
#
# One user per line:
#   <stream_name>  <publish_pass>  <play_pass>
#
# A passphrase of "-" (or leaving the column empty via "-") means "no
# passphrase for that direction; plaintext connection allowed".
#
# Stream names not listed here are rejected at the handshake stage.
#
# Examples:
#   - obs is a fully-private streamer: encrypted push, encrypted pull, same key
#   - publicshow is a public broadcast: encrypted push, plaintext pull
#   - radoo has distinct publish and play keys (recommended)
#
# name        publish_pass               play_pass
